<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OpenCode Pilot logo">
  <title>OpenCode Pilot</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1113"/>
      <stop offset="1" stop-color="#06090a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a4f4be"/>
      <stop offset="1" stop-color="#3ed16d"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#3ed16d" stop-opacity="0.42"/>
      <stop offset="0.7" stop-color="#3ed16d" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#3ed16d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded dark tile with subtle outline -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="14" fill="none" stroke="#27343c" stroke-width="1"/>

  <!-- Inner halo glow -->
  <circle cx="34" cy="34" r="24" fill="url(#halo)"/>

  <!-- Terminal chevron > (the prompt) -->
  <path d="M 18 18 L 36 32 L 18 46"
        stroke="url(#green)"
        stroke-width="5.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Live dot (signals "remote / live") -->
  <circle cx="46" cy="32" r="4" fill="url(#green)"/>
  <circle cx="46" cy="32" r="7.5" fill="none" stroke="url(#green)" stroke-width="1" opacity="0.45"/>
</svg>
