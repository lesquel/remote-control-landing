<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OpenCode Pilot — Remote dashboard for OpenCode + Codex">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1012"/>
      <stop offset="1" stop-color="#06090a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a4f4be"/>
      <stop offset="1" stop-color="#3ed16d"/>
    </linearGradient>
    <linearGradient id="greenSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ed16d" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3ed16d" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="haloLeft" cx="0.25" cy="0.4" r="0.45">
      <stop offset="0" stop-color="#3ed16d" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3ed16d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloRight" cx="0.78" cy="0.5" r="0.4">
      <stop offset="0" stop-color="#3ed16d" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3ed16d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1d262c" opacity="0.55"/>
    </pattern>
  </defs>

  <!-- Layered background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#haloLeft)"/>
  <rect width="1200" height="630" fill="url(#haloRight)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#green)"/>

  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#1d262c" stroke-width="1"/>

  <!-- Logo mark (top-left) -->
  <g transform="translate(80,72)">
    <rect width="84" height="84" rx="18" fill="#0d1113" stroke="#27343c" stroke-width="1"/>
    <circle cx="44" cy="44" r="32" fill="#3ed16d" fill-opacity="0.07"/>
    <path d="M 24 24 L 48 42 L 24 60" stroke="url(#green)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="60" cy="42" r="5" fill="url(#green)"/>
    <circle cx="60" cy="42" r="9.5" fill="none" stroke="url(#green)" stroke-width="1.2" opacity="0.45"/>
  </g>

  <!-- Eyebrow tag -->
  <g transform="translate(190,90)">
    <rect x="0" y="0" rx="999" ry="999" width="296" height="36" fill="#3ed16d" fill-opacity="0.12" stroke="#3ed16d" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="20" cy="18" r="4" fill="#a4f4be"/>
    <text x="36" y="24" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="14" letter-spacing="2" fill="#a4f4be">MIT · OPENCODE + CODEX</text>
  </g>

  <!-- Title -->
  <text x="190" y="208" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="76" font-weight="700" fill="#d7e4dc" letter-spacing="-2">OpenCode</text>
  <text x="190" y="294" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="76" font-weight="700" fill="url(#green)" letter-spacing="-2">Pilot</text>

  <!-- Tagline -->
  <text x="190" y="358" font-family="Geist, ui-sans-serif, system-ui, sans-serif" font-size="28" fill="#8a9a93">Remote dashboard for your</text>
  <text x="190" y="394" font-family="Geist, ui-sans-serif, system-ui, sans-serif" font-size="28" fill="#8a9a93">AI agents — on every device.</text>

  <!-- Stat row at the bottom -->
  <g transform="translate(190,490)">
    <text x="0" y="0" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="18" fill="#a4f4be">v1.18.2</text>
    <text x="92" y="0" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="18" fill="#566762">·</text>
    <text x="116" y="0" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="18" fill="#d7e4dc">413 tests</text>
    <text x="232" y="0" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="18" fill="#566762">·</text>
    <text x="256" y="0" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="18" fill="#d7e4dc">~20k LOC</text>
    <text x="372" y="0" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="18" fill="#566762">·</text>
    <text x="396" y="0" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="18" fill="#d7e4dc">MIT</text>
    <text x="0" y="40" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="14" fill="#566762" letter-spacing="1.5">github.com/lesquel/open-remote-control</text>
  </g>

  <!-- Right-side terminal mockup -->
  <g transform="translate(720,142)">
    <!-- Terminal frame -->
    <rect width="400" height="346" rx="10" fill="#0d1113" stroke="#1d262c" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="400" height="36" rx="10" fill="#11161a"/>
    <rect y="26" width="400" height="10" fill="#11161a"/>
    <line x1="0" y1="36" x2="400" y2="36" stroke="#1d262c" stroke-width="1"/>
    <!-- Window dots -->
    <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="34" cy="18" r="5" fill="#febc2e"/>
    <circle cx="50" cy="18" r="5" fill="#28c840"/>
    <text x="200" y="22" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="11" fill="#566762" letter-spacing="1">~/my-project — opencode</text>
    <text x="376" y="22" text-anchor="end" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="11" fill="#3ed16d">● live</text>

    <!-- Terminal body with halo -->
    <rect x="1" y="37" width="398" height="308" fill="#0d1113"/>
    <ellipse cx="200" cy="60" rx="180" ry="80" fill="#3ed16d" fill-opacity="0.05"/>

    <!-- Lines -->
    <text x="20" y="76"  font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="13" fill="#a4f4be">$ <tspan fill="#d7e4dc">bunx @lesquel/opencode-pilot init</tspan></text>
    <text x="20" y="106" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="13" fill="#3ed16d">✓ <tspan fill="#566762">writing</tspan> <tspan fill="#d7e4dc">opencode.json::plugin</tspan></text>
    <text x="20" y="128" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="13" fill="#3ed16d">✓ <tspan fill="#566762">writing</tspan> <tspan fill="#d7e4dc">tui.json::plugin</tspan></text>
    <text x="20" y="150" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="13" fill="#3ed16d">✓ <tspan fill="#566762">codex bridge ready</tspan></text>
    <text x="20" y="180" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="13" fill="#3ed16d">● <tspan fill="#d7e4dc">Installed.</tspan> <tspan fill="#566762">Restart OpenCode.</tspan></text>

    <!-- Box -->
    <text x="20" y="216" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="11" fill="#3ed16d">┌────────────────────────────────────┐</text>
    <text x="20" y="232" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="11" fill="#3ed16d">│  <tspan fill="#d7e4dc">opencode-pilot</tspan> <tspan fill="#566762">v1.18.2 · loaded</tspan>   │</text>
    <text x="20" y="248" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="11" fill="#3ed16d">│                                    │</text>
    <text x="20" y="264" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="11" fill="#3ed16d">│  <tspan fill="#566762">URL:</tspan>   <tspan fill="#a4f4be">127.0.0.1:4097</tspan>            │</text>
    <text x="20" y="280" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="11" fill="#3ed16d">│  <tspan fill="#566762">Token:</tspan> <tspan fill="#d7e4dc">4a9c-2f1b-8d30-ee77</tspan>       │</text>
    <text x="20" y="296" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="11" fill="#3ed16d">│  <tspan fill="#566762">Phone:</tspan> press <tspan fill="#d7e4dc">c</tspan> in dashboard for QR │</text>
    <text x="20" y="312" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="11" fill="#3ed16d">└────────────────────────────────────┘</text>

    <text x="20" y="334" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="13" fill="#566762">› ready. press <tspan fill="#a4f4be">/remote</tspan> anytime.<tspan fill="#3ed16d">█</tspan></text>
  </g>
</svg>
